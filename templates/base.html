<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ShirkaAI{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#dde6ff',
              200: '#c3d0ff',
              300: '#9eb2ff',
              400: '#7a8eff',
              500: '#5a6fff',
              600: '#4150f5',
              700: '#3540db',
              800: '#2c35b1',
              900: '#27308c',
              950: '#181e55',
            },
          },
        },
      },
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body { @apply bg-gray-950 text-gray-100; }
    }
    @layer components {
      .nav-link {
        @apply flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400
               hover:bg-gray-800 hover:text-white transition-colors duration-150 text-sm font-medium;
      }
      .nav-link.active {
        @apply bg-brand-700/20 text-brand-400 border border-brand-700/30;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full">
  {% block body %}{% endblock %}

  <!-- Cookie consent banner -->
  <div id="cookie-banner"
       class="fixed bottom-0 inset-x-0 z-50 flex flex-col sm:flex-row items-start sm:items-center
              gap-4 px-5 py-4 bg-gray-900 border-t border-white/8 shadow-2xl"
       style="display:none!important">
    <div class="flex-1 text-sm text-gray-300 leading-relaxed">
      <span class="font-semibold text-white">🍪 Cookies</span>
      — Usamos cookies esenciales para el funcionamiento del sitio y de sesión.
      No rastreamos ni compartimos tu información con terceros.
      <a href="#" class="underline text-brand-400 hover:text-brand-300 ml-1">Más información</a>
    </div>
    <div class="flex gap-2 shrink-0">
      <button onclick="acceptCookies()"
              class="px-4 py-2 rounded-lg bg-brand-600 hover:bg-brand-500 text-white text-xs font-semibold transition-colors">
        Aceptar
      </button>
      <button onclick="rejectCookies()"
              class="px-4 py-2 rounded-lg border border-white/10 text-gray-400 hover:text-white hover:border-white/20 text-xs font-medium transition-colors">
        Solo esenciales
      </button>
    </div>
  </div>

  <script>
    (function() {
      var consent = localStorage.getItem('cookie_consent');
      if (!consent) {
        var banner = document.getElementById('cookie-banner');
        banner.style.removeProperty('display');
      }
    })();
    function acceptCookies() {
      localStorage.setItem('cookie_consent', 'accepted');
      document.getElementById('cookie-banner').style.display = 'none';
    }
    function rejectCookies() {
      localStorage.setItem('cookie_consent', 'essential');
      document.getElementById('cookie-banner').style.display = 'none';
    }
  </script>
</body>
</html>
